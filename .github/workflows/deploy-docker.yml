name: Deploy BrixNet - Simple Docker

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test Network Connectivity
      run: |
        echo "🌐 Testing network connectivity to server..."
        nc -zv ${{ secrets.SERVER_HOST }} 22 || echo "❌ Port 22 not reachable"
        ping -c 3 ${{ secrets.SERVER_HOST }} || echo "❌ Server not reachable"
        
    - name: Debug SSH Connection
      run: |
        echo "🔍 Debugging SSH connection..."
        echo "Server: ${{ secrets.SERVER_HOST }}"
        echo "User: ${{ secrets.SERVER_USER }}"
        echo "Port: 22"
        
        # Test with sshpass (alternative method)
        sudo apt-get update && sudo apt-get install -y sshpass
        
        echo "🔐 Attempting SSH connection with sshpass..."
        timeout 30 sshpass -p '${{ secrets.SERVER_PASSWORD }}' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'echo "SSH connection successful!"' || echo "SSH connection failed"
        
    - name: Test SSH Connection
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        timeout: 60s
        script: |
          echo "🔐 Testing SSH connection..."
          echo "🖥️ Connected to: $(hostname)"
          echo "👤 User: $(whoami)"
          echo "📁 Current directory: $(pwd)"
          echo "🐳 Docker version: $(docker --version)"
          echo "📋 Docker Compose version: $(docker-compose --version)"
          echo "✅ SSH connection test successful!"
      
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        timeout: 300s
        command_timeout: 60s
        script: |
          # Set variables
          PROJECT_PATH="${{ secrets.PROJECT_PATH }}"
          
          echo "🐳 Deploying BrixNet with Docker..."
          echo "📁 Project Path: $PROJECT_PATH"
          
          # Go to project directory
          cd $PROJECT_PATH
          
          # Create backup (optional but recommended)
          echo "📦 Creating quick backup..."
          BACKUP_DIR="backup_$(date +%Y%m%d_%H%M%S)"
          mkdir -p ../backups
          docker-compose down || true
          tar -czf "../backups/${BACKUP_DIR}.tar.gz" . || echo "Backup failed, continuing..."
          
          # Sync files to server (excluding sensitive files)
          echo "📤 Syncing files..."
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='*.md' \
            --exclude='composer.lock' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='backups/' \
            ./ $PROJECT_PATH/
          
          echo "✅ Files synced"
          
          # Build and deploy (exactly what you do manually)
          echo "🔨 Building and starting containers..."
          docker-compose down
          docker-compose build --no-cache
          docker-compose up -d
          
          echo "✅ Containers started"
          
          # Wait for containers to be ready
          echo "⏳ Waiting for containers to start..."
          sleep 30
          
          # Show status
          echo "📊 Container Status:"
          docker-compose ps
          
          # Show recent logs
          echo "📋 Recent Logs:"
          docker-compose logs --tail=10
          
          # Health check
          echo "🔍 Health check..."
          if docker-compose ps | grep -q "Up"; then
            echo "✅ Deployment successful!"
            echo "🌐 BrixNet is running"
          else
            echo "❌ Some containers may not be running properly"
            docker-compose logs
            exit 1
          fi
          
          echo "🎉 Docker deployment completed!"

    - name: Quick Health Check
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        timeout: 30s
        script: |
          cd ${{ secrets.PROJECT_PATH }}
          
          # Wait a bit more for full startup
          sleep 15
          
          # Final status check
          if docker-compose ps | grep -q "Up"; then
            echo "✅ All containers are running!"
            echo "🐳 BrixNet deployment completed successfully"
          else
            echo "⚠️ Some containers may still be starting..."
            docker-compose ps
          fi

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ BrixNet Docker deployment completed successfully!"
          echo "🐳 Your containers are updated and running"
        else
          echo "❌ Docker deployment failed. Check the logs above."
        fi
